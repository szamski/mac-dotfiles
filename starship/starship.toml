"$schema" = 'https://starship.rs/config-schema.json'

# TokyoNight-inspired minimal prompt
# Colors: storm=#24283b, blue=#7aa2f7, green=#9ece6a, magenta=#bb9af7,
#         cyan=#7dcfff, red=#f7768e, yellow=#e0af68, fg=#a9b1d6, comment=#565f89

format = """
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

[character]
success_symbol = '[❯](bold #7aa2f7)'
error_symbol = '[❯](bold #f7768e)'

[directory]
style = 'bold #7aa2f7'
format = '[$path]($style) '
truncation_length = 3
truncation_symbol = '…/'
read_only = ' 󰌾'
read_only_style = '#f7768e'

[directory.substitutions]
'Documents' = '󰈙 '
'Downloads' = ' '
'Music' = ' '
'Pictures' = ' '

[fill]
symbol = ' '

[git_branch]
symbol = ' '
style = '#bb9af7'
format = 'on [$symbol$branch]($style) '

[git_status]
style = '#e0af68'
format = '([$all_status$ahead_behind]($style) )'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇡${ahead_count}⇣${behind_count}'
modified = '!${count}'
staged = '+${count}'
untracked = '?${count}'
deleted = '✘${count}'
conflicted = '=${count}'

[python]
symbol = ' '
style = '#9ece6a'
format = 'via [$symbol$version( \($virtualenv\))]($style) '

[nodejs]
symbol = ' '
style = '#9ece6a'
format = 'via [$symbol$version]($style) '

[rust]
symbol = ' '
style = '#e0af68'
format = 'via [$symbol$version]($style) '

[golang]
symbol = ' '
style = '#7dcfff'
format = 'via [$symbol$version]($style) '

[cmd_duration]
min_time = 2_000
style = '#565f89'
format = 'took [$duration]($style) '

[time]
disabled = false
time_format = '%R'
style = '#565f89'
format = '[$time]($style)'
